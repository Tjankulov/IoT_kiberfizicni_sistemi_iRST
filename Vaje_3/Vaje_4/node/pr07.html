<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test</title>
</head>
<body>
    Pozdrav s spletne strani HTML - uporaba knjižnice express!
    <br>
    Uporaba 
    <webSocket-a44>
        <br>
        <button id="pošljiSporočilo", onClick="pošljiSporočilo()">Pošlji sporočilo</button>
        <br>
        Sporočilo: <input id="sporočilo" size="50" value='{"tipSporočila": "LED", "pin": 2, "vrednost": 1}'> <!--json-->


        <script>
            "use strict"; // omogočimo strogi način (da moramo prej spremenljivko napovedati)
            let ws = new WebSocket("ws://192.168.1.219:8888"); // ustvarimo povezavo prek spletnega vtičnika - povežemo se z node.js preko vrat (porta) 8888 (2^16 portov)

            function pošljiSporočilo(){
                let sporočilo = document.getElementById("sporočilo").value; // string iz testnega input polja html vmesnika
                ws.send(sporočilo); // naše sporočilo "Testno sporočilo!" pošljemo preko spletnega vtičnika ws port 8888
            }
        </script>
    </webSocket-a44>
</body>
</html>
