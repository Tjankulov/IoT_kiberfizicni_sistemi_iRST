<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vmesnik</title>
</head>
<body>
    Pozdravljen IoT vmesnik!
    <br>
    <webSocket-a44>
        <br>
        <button id="pošljiSporočilo" onClick="pošljiJSONSporočilo()">Pošlji JSON sporočilo</button>
        <br>
        Sporočilo: <input id="JSONsporočilo" size="50" value='{"tipSporočila": "LED", "pin": 2, "vrednost": 1}'>

        <div id="izpis1">x</div>

        <script type="text/javascript" charset="utf-8">
            "use strict"; // omogočimo strogi način (da moramo prej spremenljivko napovedati)

            let izpis1 = document.getElementById("izpis1");

            let ws = new WebSocket("ws://192.168.1.219:8888"); // ustvarimo povezavo prek spletnega vtičnika - povežemo se z node.js preko vrat (porta) 8888 (2^16 portov)

            function pošljiJSONSporočilo(){
                let sporočilo = document.getElementById("JSONsporočilo").value; // string iz testnega input polja html vmesnika
                ws.send(sporočilo); // naše sporočilo "Testno sporočilo!" pošljemo preko spletnega vtičnika ws port 8888
            }

            ws.onmessage = function(event){
                var msg = JSON.parse(event.data); // string iz ws spravimo v JSON
                switch(msg.tipSporočila){
                    case "tipka":
                        izpis1.innerHTML = event.data;
                    break;
                };
            };
        </script>
    </webSocket-a44>
</body>
</html>
