<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">

    <style>
        html {
            font-family: Helvetica;
            text-align: center;
        }

        body {
            margin-top: 50px;
        }

        h1 {
            color: #444444;
            margin: 50px auto 30px;
        }

        h3 {
            color: #444444;
            margin-bottom: 50px;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 20px;
        }

        .box {
            text-align: center;
        }

        .box img {
            width: 80px;
            margin-bottom: 15px;
        }

        .gumb_vklop {
            background-color: #07e42c;
            display: block;
            width: 110px;
            color: white;
            padding: 13px 30px;
            text-decoration: none;
            font-size: 20px;
            margin: 10px auto;
            border-radius: 5px;
            cursor: pointer;
        }

        .gumb_izklop {
            background-color: #e60b0b;
            display: block;
            width: 110px;
            color: white;
            padding: 13px 30px;
            text-decoration: none;
            font-size: 20px;
            margin: 10px auto;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>esp32</title>
</head>

<body>

    <h1>Esp32 spletni strežnik</h1>
    <h3>Priklop na WiFi usmerjevalnik</h3>

    <div class="container">

        <div class="box">
            <img src="red.png">
            <a class="gumb_vklop" href="/r1">Prižgi LED</a>
            <a class="gumb_izklop" href="/r0">Ugasni LED</a>
        </div>

        <div class="box">
            <img src="blue.png">
            <a class="gumb_vklop" href="/b1">Prižgi LED</a>
            <a class="gumb_izklop" href="/b0">Ugasni LED</a>
        </div>

        <div class="box">
            <img src="green.png">
            <a class="gumb_vklop" href="/g1">Prižgi LED</a>
            <a class="gumb_izklop" href="/g0">Ugasni LED</a>
        </div>

    </div>

    <p>HTTP strežnik je zagnan.</p>

</body>
</html>
