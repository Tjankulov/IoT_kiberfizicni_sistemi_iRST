<!-- SEMINARSKA NALOGA - FOTOUPORNIK (GRAF IN ALARM) -->

<!DOCTYPE html>
<html lang="sl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket</title>

    <style>
        body {
            text-align: center;
            margin: 0;
            padding: 20px;
            background-color: #eeeeee;
        }

        .vsebina {
            max-width: 500px;
            margin: auto;
        }

        button {
            padding: 12px 22px;
            margin: 6px;
            border-radius: 10px;
            border: none;
            font-size: 16px;
            cursor: pointer;
        }

        .prizgi {
            background-color: #b8f2c2;
        }

        .ugasni {
            background-color: #f7b7b7;
        }

        #stanjeLed {
            margin-top: 12px;
            font-weight: bold;
        }

        #stanjeAlarm {
            margin-top: 12px;
            font-weight: bold;
            color: #b00020;
        }

        #stanjeFotoupornik {
            margin-top: 12px;
            font-weight: bold;
        }

        /* da bo JSON izpis na telefonu lepši */
        #ledJson, #fotoupornikJson {
            word-break: break-all;
            font-size: 13px;
        }

        canvas {
            width: 100%;
            max-width: 400px;
            height: 100px;
            border: 1px dashed #099999;
            background-color: #000000
        }
    </style>
</head>

<body>
    <div class="vsebina">

        <p>Pozdravljen IoT vmesnik!</p>

        <div style="font-size: 40px;">💡</div>
        <div id="stanjeLed">×</div>

        <button class="prizgi" onClick="prizgiLed()">Prižgi LED</button>
        <button class="ugasni" onClick="ugasniLed()">Ugasni LED</button>

        <div id="ledJson">×</div>

        <div id="stanjeAlarm"></div>
        <br>
        <br>
        <br>
        <br>
        <br>
        <br>

        <img src="https://raw.githubusercontent.com/OnionIoT/Onion-Docs/master/Omega2/Kit-Guides/img/photoresistor-symbol.png"
            alt="Fotoupornik" width="90">
        <div id="stanjeFotoupornik">×</div>
        <canvas id="platno1" width="400" height="100"></canvas>
        <div id="fotoupornikJson">×</div>

    </div>

    <script type="text/javascript" charset="utf-8">
        "use strict";
        let graf1; // spremenljivka, ki bo predstavljala prvi graf (objekt razreda 'Graf')

        // html element, v katerega bomo izpisovali sporočila, ki jih prejmemo iz node.js serverja preko WebSocket port 8888 povezave
        let ledJson = document.getElementById("ledJson");
        let fotoupornikJson = document.getElementById("fotoupornikJson");
        let stanjeLed = document.getElementById("stanjeLed");
        let stanjeAlarm = document.getElementById("stanjeAlarm");
        let stanjeFotoupornik = document.getElementById("stanjeFotoupornik");

        class Graf {
            constructor(idPlatna) {
                // "boilerplate" koda za platno
                this.can1 = document.getElementById(idPlatna); // v html delu poiščemo platno1; spremenljivka can1 sedaj predstavlja platno1

                this.plat1 = this.can1.getContext("2d"); // od tu dalje delamo s spremenljivko plat1 (za izris na platnu iz id "platno1")

                this.plat1.strokeStyle = "#ffff00"; // določimo barvo črte, hex oblika #RRGGBB
                this.x = new Array(); // ustvarimo novo tabelo x (polje), lahko bi zapisali tudi var x = []; -> spremenljivka tipa Array
                this.y = new Array(); // ustvarimo novo tabelo y (polje), lahko bi zapisali tudi var x = []; -> spremenljivka tipa Array

                // Dodamo spremenljivko za maksimalno širino grafa
                this.maxGrafX = this.can1.width; // maksimum po abscisi
                this.maxGrafY = this.can1.height; // maksimum po ordinati

                // napočnimo polje x
                for (var i = 0; i < this.maxGrafX; i++) {
                    this.x[i] = i; // za x zapišemo [0, 1, 2, ...], t.j. vrednost i-ja
                }
            }

            dodajVrednostAliBrišiInDodaj(yVrednost) {
                if (this.y.length == this.maxGrafX + 1) { // če je platno veliko 10 x 10 -> imamo 11 x 11 točk, zaradi tega imamo "+1" - indeksi!
                    // rezanje in dodajanje (v primeru, da je tabela vrednosti polna)
                    this.y.splice(0, 1);
                    this.y[this.maxGrafX] = yVrednost;
                }
                else { // če polje z vrednostmi še ni polno
                    this.y.push(yVrednost); // potisnemo novo vrednost v polje
                }
            }

            izriši(yVrednost) {
                this.dodajVrednostAliBrišiInDodaj(yVrednost);
                // brisanje platna
                this.plat1.clearRect(0, 0, this.maxGrafX, this.maxGrafY); // zgornji dve levi koordinati pravoktnika, širina in višina - brišemo platno

                // začnemo z izrisom
                this.plat1.beginPath();


                // gremo po zanki skozi vrednosti
                for (var i = 0; i < this.y.length; i++) {
                    this.plat1.lineTo(this.x[i], this.maxGrafY - this.y[i] / 4095 * this.maxGrafY); // za vrednost y pomnožimo naključno vrednost z višino platna, npr. 0.25 * 100 = 25
                }
                // in prikažemo črto na platnu
                this.plat1.stroke();
            }
        }

        function prizgiLed() {
            let sporocilo = '{"tipSporočila":"LED","pin":33,"vrednost":1}';
            ws.send(sporocilo);
            stanjeLed.innerHTML = "Glavna LED dioda prižgana!";
        }

        function ugasniLed() {
            let sporocilo = '{"tipSporočila":"LED","pin":33,"vrednost":0}';
            ws.send(sporocilo);
            stanjeLed.innerHTML = "Glavna LED dioda ugasnjena!";
        }


        graf1 = new Graf("platno1"); // ustvarimo 'graf1' kot objekt razreda 'Graf'

        let ws = new WebSocket("ws://10.33.130.244:8888"); // ustvarimo povezavo prek spletnega vtičnika WebSocket - povežemo se z node.js preko vrat oz. port-a 8888

        ws.onmessage = function (event) { // funkcija, ki se izvede, ko prejme sporočilo iz node.js serverja preko WebSocket port 8888 povezave
            var msg = JSON.parse(event.data); // string iz ws spravimo v JSON objekt
            switch (msg.tipSporočila) { // glede na tip sporočila izvedemo ustrezen del kode
                case "fotoupornik":
                    fotoupornikJson.innerHTML = event.data;
                    stanjeFotoupornik.innerHTML = msg.vrednost;
                    graf1.izriši(msg.vrednost); // vrednost, ki jo dobimo iz fotoupornika

                    if (msg.alarm == 1) {
                        stanjeAlarm.innerHTML = "Alarm aktiviran! Pomožna led dioda prižgana – Preveri glavno led diodo";
                    }
                    else {
                        stanjeAlarm.innerHTML = "";
                    }
                    break;

                case "LED":
                    ledJson.innerHTML = event.data;

                    if (msg.vrednost == 1) {
                        stanjeLed.innerHTML = "Glavna LED dioda prižgana!";
                    }
                    else {
                        stanjeLed.innerHTML = "Glavna LED dioda ugasnjena!";
                    }
                    break;
            };
        };
    </script>
</body>

</html>
